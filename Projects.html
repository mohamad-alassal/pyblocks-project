<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PythonBlocks – My Missions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Css/projects.css">
</head>

<body class="projects-page">

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar">
        <div class="nav-logo">
            <div class="logo-icon">P</div>
            <span class="logo-text">PythonBlocks.</span>
        </div>

        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="Projects.html" class="nav-link active">Projects</a>
            <a href="how-it-works.html" class="nav-link">How It Works</a>
        </div>

        <div class="nav-actions">
            <button class="dark-toggle" id="darkToggle" title="Toggle dark mode">🌙</button>
        </div>
    </nav>

    <!-- ===== DASHBOARD CONTENT ===== -->
    <main class="dashboard">

        <div class="dashboard-header">

            <div class="dashboard-title-group">
                <span class="dashboard-badge">✨ PERSONAL HUB</span>
                <h1 class="dashboard-title">My Missions</h1>
                <p class="dashboard-subtitle">Continue your visual programming journey.</p>
            </div>

            <button class="new-mission-btn" onclick="openModal()">
                + New Mission
            </button>
        </div>

        <!-- Search bar -->
        <div class="search-bar-wrapper">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input
                type="text"
                class="search-bar"
                id="searchInput"
                placeholder="Search by project name..."
                oninput="filterProjects()"
            />
        </div>

        <!-- Projects grid -->
        <div class="projects-grid" id="projectsGrid">
            <!-- Projects are added here automatically via JavaScript -->
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">📭</div>
            <p>No projects found. Try a different search or create a new one!</p>
        </div>

    </main>

    <!-- ===== MODAL: Create New Project ===== -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
        <div class="modal">
            <h2 class="modal-title">Create New Mission</h2>
            <p class="modal-subtitle">Give your project a name to get started.</p>

            <input
                type="text"
                class="modal-input"
                id="projectNameInput"
                placeholder="e.g. My Calculator"
                maxlength="40"
            />

            <div class="modal-buttons">
                <button class="modal-cancel-btn" onclick="closeModal()">Cancel</button>
                <button class="modal-create-btn" onclick="createProject()">Create →</button>
            </div>
        </div>
    </div>

    <script src="javascript/projects.js"></script>

</body>
</html>
